[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
addopts =
    --cov=game
    --cov=network
    --cov-report=term-missing
    --cov-report=html
    --cov-branch
    --cov-fail-under=80
markers =
    core: basic command functionality
    fs: filesystem mutation tests
    integration: pipes, redirects, multi-command flows
    slow: expensive scenario tests